<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Generátor názvu firmy | Zdarma online</title>

<meta name="description" content="Vygeneruj název firmy během pár sekund. Zadej obor nebo klíčové slovo a náš generátor ti navrhne originální názvy firmy nebo projektu.">

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px
}

input{
width:80%;
padding:12px;
font-size:16px;
margin-top:10px
}

button{
margin-top:15px;
padding:12px 20px;
font-size:16px;
background:#22c55e;
border:none;
color:white;
cursor:pointer
}

.results{
margin-top:25px;
font-size:20px
}

.result{
background:#334155;
padding:10px;
margin:10px;
border-radius:8px
}

</style>
</head>

<body>

<div class="container">

<h1>Generátor názvu firmy</h1>

<p>Zadej obor nebo klíčové slovo.</p>

<input id="keyword" placeholder="např. stavby, marketing, IT">

<br>

<button onclick="generate()">Vygenerovat názvy</button>

<div class="results" id="results"></div>

</div>

<script>

const prefixes = [
"Profi",
"Top",
"Smart",
"Elite",
"Moderní",
"Next",
"Prime"
]

const suffixes = [
"Stavby",
"Projekt",
"Studio",
"Group",
"Servis",
"Solutions",
"Design"
]

const brandSuffix = [
"Pro",
"Tech",
"Lab",
"Profi",
"Expert",
"Plus",
"Works"
]

function capitalize(word){
return word.charAt(0).toUpperCase() + word.slice(1)
}

function generate(){

const keyword=document.getElementById("keyword").value.trim()

const results=document.getElementById("results")

results.innerHTML=""

if(keyword.length===0){
results.innerHTML="<div class='result'>Zadej klíčové slovo</div>"
return
}

for(let i=0;i<10;i++){

let name

const type=Math.floor(Math.random()*3)

const prefix=prefixes[Math.floor(Math.random()*prefixes.length)]
const suffix=suffixes[Math.floor(Math.random()*suffixes.length)]
const brand=brandSuffix[Math.floor(Math.random()*brandSuffix.length)]

const word=capitalize(keyword)

if(type===0){
name=prefix+" "+word
}

if(type===1){
name=word+" "+suffix
}

if(type===2){
name=word+brand
}

const div=document.createElement("div")
div.className="result"
div.innerText=name

results.appendChild(div)

}

}

</script>

</body>
</html>
