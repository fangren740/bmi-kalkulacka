<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Generátor názvu firmy | Zdarma online</title>

<meta name="description" content="Vygeneruj název firmy během pár sekund. Zadej obor nebo klíčové slovo a náš generátor ti navrhne originální názvy firmy nebo projektu.">

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px
}

input{
width:80%;
padding:12px;
font-size:16px;
margin-top:10px
}

button{
margin-top:15px;
padding:12px 20px;
font-size:16px;
background:#22c55e;
border:none;
color:white;
cursor:pointer
}

.results{
margin-top:25px;
font-size:20px
}

.result{
background:#334155;
padding:10px;
margin:10px;
border-radius:8px
}

</style>
</head>

<body>

<div class="container">

<h1>Generátor názvu firmy</h1>

<p>Zadej klíčové slovo nebo obor podnikání.</p>

<input id="keyword" placeholder="např. marketing, stavebnictví, IT">

<br>

<button onclick="generate()">Vygenerovat názvy</button>

<div class="results" id="results"></div>

</div>

<script>

const prefixes = [
"Pro",
"Smart",
"Next",
"Ultra",
"Hyper",
"Prime",
"Vision",
"Future"
]

const suffixes = [
"Solutions",
"Group",
"Studio",
"Lab",
"Works",
"Experts",
"Systems",
"Agency"
]

function generate(){

const keyword=document.getElementById("keyword").value

const results=document.getElementById("results")

results.innerHTML=""

for(let i=0;i<8;i++){

const prefix=prefixes[Math.floor(Math.random()*prefixes.length)]

const suffix=suffixes[Math.floor(Math.random()*suffixes.length)]

const name=prefix+" "+keyword+" "+suffix

const div=document.createElement("div")

div.className="result"

div.innerText=name

results.appendChild(div)

}

}

</script>

</body>
</html>
