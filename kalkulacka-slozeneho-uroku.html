<script>
  const initialInput = document.getElementById('initial');
  const monthlyInput = document.getElementById('monthly');
  const rateInput = document.getElementById('rate');
  const yearsInput = document.getElementById('years');
  const compoundInput = document.getElementById('compound');
  const currencyInput = document.getElementById('currency');
  const calcBtn = document.getElementById('calcBtn');

  const futureValueEl = document.getElementById('futureValue');
  const investedValueEl = document.getElementById('investedValue');
  const profitValueEl = document.getElementById('profitValue');
  const summaryTextEl = document.getElementById('summaryText');
  const principalBarEl = document.getElementById('principalBar');
  const growthBarEl = document.getElementById('growthBar');
  const yearTableEl = document.getElementById('yearTable');

  function parseLocalNumber(value) {
    if (typeof value !== 'string') return Number(value);
    return Number(value.replace(',', '.').trim());
  }

  function formatCurrency(value, currency) {
    const locale = currency === 'CZK' ? 'cs-CZ' : 'en-US';
    return new Intl.NumberFormat(locale, {
      style: 'currency',
      currency,
      maximumFractionDigits: 0
    }).format(value);
  }

  function showError(message) {
    futureValueEl.textContent = 'Chybný vstup';
    investedValueEl.textContent = '-';
    profitValueEl.textContent = '-';
    summaryTextEl.textContent = message;
    principalBarEl.style.width = '50%';
    growthBarEl.style.width = '50%';
    yearTableEl.innerHTML = '<tr><td colspan="4" class="muted">Nelze spočítat výsledek.</td></tr>';
  }

  function calculateCompoundInterest() {
    const initial = parseLocalNumber(initialInput.value);
    const monthly = parseLocalNumber(monthlyInput.value);
    const annualRate = parseLocalNumber(rateInput.value);
    const years = parseLocalNumber(yearsInput.value);
    const compoundsPerYear = Number(compoundInput.value);
    const currency = currencyInput.value;

    if (
      Number.isNaN(initial) ||
      Number.isNaN(monthly) ||
      Number.isNaN(annualRate) ||
      Number.isNaN(years) ||
      Number.isNaN(compoundsPerYear)
    ) {
      showError('Zadej prosím všechna čísla správně. Můžeš použít čárku i tečku.');
      return;
    }

    if (initial < 0 || monthly < 0 || annualRate < 0 || years <= 0 || compoundsPerYear <= 0) {
      showError('Hodnoty musí být nezáporné a doba investování musí být větší než 0.');
      return;
    }

    const totalMonths = Math.round(years * 12);
    let balance = initial;
    const yearlyRows = [];

    for (let month = 1; month <= totalMonths; month++) {
      balance += monthly;

      if (compoundsPerYear === 12) {
        const monthlyRate = annualRate / 100 / 12;
        balance *= (1 + monthlyRate);
      } else if (compoundsPerYear === 4) {
        if (month % 3 === 0) {
          balance *= (1 + (annualRate / 100 / 4));
        }
      } else if (compoundsPerYear === 1) {
        if (month % 12 === 0) {
          balance *= (1 + (annualRate / 100));
        }
      }

      if (month % 12 === 0) {
        const year = month / 12;
        const investedSoFar = initial + (monthly * month);
        const profitSoFar = balance - investedSoFar;

        yearlyRows.push({
          year,
          investedSoFar,
          balance,
          profitSoFar
        });
      }
    }

    const invested = initial + (monthly * totalMonths);
    const profit = balance - invested;

    const principalPercent = balance > 0 ? (invested / balance) * 100 : 50;
    const growthPercent = balance > 0 ? (profit / balance) * 100 : 50;

    futureValueEl.textContent = formatCurrency(balance, currency);
    investedValueEl.textContent = formatCurrency(invested, currency);
    profitValueEl.textContent = formatCurrency(profit, currency);

    summaryTextEl.textContent =
      `Za ${years} let vložíš celkem ${formatCurrency(invested, currency)} a při ročním zhodnocení ${annualRate} % může mít investice hodnotu ${formatCurrency(balance, currency)}.`;

    principalBarEl.style.width = `${Math.max(principalPercent, 2)}%`;
    growthBarEl.style.width = `${Math.max(growthPercent, 2)}%`;

    yearTableEl.innerHTML = yearlyRows.map(row => `
      <tr>
        <td>${row.year}</td>
        <td>${formatCurrency(row.investedSoFar, currency)}</td>
        <td>${formatCurrency(row.balance, currency)}</td>
        <td>${formatCurrency(row.profitSoFar, currency)}</td>
      </tr>
    `).join('');
  }

  calcBtn.addEventListener('click', calculateCompoundInterest);

  [initialInput, monthlyInput, rateInput, yearsInput].forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') calculateCompoundInterest();
    });
  });

  calculateCompoundInterest();
</script>
