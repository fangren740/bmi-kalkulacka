<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPH kalkulačka online | Výpočet DPH 21 %, 15 %, 10 % | RychléVýpočty.cz</title>
  <meta name="description" content="Spočítejte cenu s DPH i bez DPH. Kalkulačka DPH pro sazby 21 %, 15 % a 10 %. Výpočet DPH přehledně a zdarma online.">
  <meta name="keywords" content="DPH kalkulačka, výpočet DPH, DPH 21, DPH 15, DPH 10, cena bez DPH, cena s DPH">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://rychlevypocty.cz/dph-kalkulacka.html">

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #5f6b85;
      --primary: #2152ff;
      --primary-dark: #183dbf;
      --border: #dbe3f0;
      --success: #138a4b;
      --shadow: 0 12px 32px rgba(20, 32, 70, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #f7f9fd 0%, #eef3fb 100%);
      color: var(--text);
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.9);
    }

    .brand {
      font-weight: 800;
      font-size: 18px;
    }

    .brand span { color: var(--primary); }

    .hero {
      padding: 40px 0 10px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .sub {
      color: var(--muted);
      max-width: 700px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 20px 0 40px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      font-size: 16px;
    }

    button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    .result-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid var(--border);
    }

    .big {
      font-size: 28px;
      font-weight: 800;
    }

    .muted {
      color: var(--muted);
    }

    @media(max-width:900px){
      .layout{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="container">
    <div class="brand">Rychlé<span>Výpočty</span>.cz</div>
  </div>
</div>

<div class="container hero">
  <h1>DPH kalkulačka</h1>
  <p class="sub">
    Spočítejte cenu s DPH i bez DPH během pár sekund. Kalkulačka podporuje základní sazby 21 %, 15 % a 10 %.
  </p>
</div>

<div class="container layout">

  <div class="card">
    <h2>Výpočet DPH</h2>

    <label>Částka</label>
    <input type="number" id="amount" value="1000">

    <label>Typ výpočtu</label>
    <select id="mode">
      <option value="with">Cena s DPH</option>
      <option value="without">Cena bez DPH</option>
    </select>

    <label>Sazba DPH</label>
    <select id="rate">
      <option value="21">21 %</option>
      <option value="15">15 %</option>
      <option value="10">10 %</option>
    </select>

    <button onclick="calcDPH()">Spočítat</button>
  </div>

  <div class="card">
    <h2>Výsledek</h2>

    <div class="result-box">
      <div class="muted">Cena bez DPH</div>
      <div class="big" id="withoutDPH">0 Kč</div>
    </div>

    <div class="result-box">
      <div class="muted">DPH</div>
      <div class="big" id="dph">0 Kč</div>
    </div>

    <div class="result-box">
      <div class="muted">Cena s DPH</div>
      <div class="big" id="withDPH">0 Kč</div>
    </div>

  </div>

</div>

<script>

function format(num){
  return new Intl.NumberFormat('cs-CZ').format(num) + " Kč";
}

function calcDPH(){
  let amount = parseFloat(document.getElementById("amount").value);
  let rate = parseFloat(document.getElementById("rate").value);
  let mode = document.getElementById("mode").value;

  let without, withVat, vat;

  if(mode === "with"){
    withVat = amount;
    without = amount / (1 + rate/100);
    vat = withVat - without;
  } else {
    without = amount;
    vat = amount * (rate/100);
    withVat = without + vat;
  }

  document.getElementById("withoutDPH").innerText = format(without);
  document.getElementById("dph").innerText = format(vat);
  document.getElementById("withDPH").innerText = format(withVat);
}

calcDPH();

</script>

</body>
</html>
